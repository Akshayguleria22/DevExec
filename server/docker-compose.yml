services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: Devexec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: A1k2s3h4a5y6
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/devexec
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
